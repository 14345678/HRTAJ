<!-- Begin
var no = 10;
var speed = 100;
dropsrc=document.all("aloha").src

var dx, xp, yp; 
var amx,amy, stx, sty;
var i, doc_width = 800, doc_height = 500;
 
dx = new Array();
xp = new Array();
yp = new Array();
amx = new Array();
amy = new Array();
stx = new Array();
sty = new Array();

for (i = 0; i < no; ++ i) {  
dx[i] = 0;                        
xp[i] = Math.random()*(doc_width-30)+10;
yp[i] = Math.random()*doc_height;
amy[i] = 12+ Math.random()*20;  
amx[i] = 10+ Math.random()*40;
stx[i] = 0.02 + Math.random()/10;
sty[i] = 0.7 + Math.random(); 
 {
{
document.write("<div id=\"dot"+ i +"\" style=\"POSITION: absolute; Z-INDEX: "+ i +"; VISIBILITY: visible; TOP: 15px; LEFT: 15px;\"><img src=\"" + dropsrc + "\" border=\"0\"></div>");
}
   }
}
function snowIE() { 
for (i = 0; i < no; ++ i) { 
yp[i] += sty[i];
if (yp[i] > doc_height-50) {
xp[i] = Math.random()*(doc_width-amx[i]-30);
yp[i] = 0;
stx[i] = 0.1 + Math.random()/10;
sty[i] = 2 + Math.random();

}
dx[i] += stx[i];
document.all["dot"+i].style.pixelTop = yp[i]+ amy[i]*Math.cos(dx[i])/2;
document.all["dot"+i].style.pixelLeft = xp[i] + amx[i]*Math.sin(dx[i]);
}
setTimeout("snowIE()", speed);
}
 {
snowIE();
}


// End -->
